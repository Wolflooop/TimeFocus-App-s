openapi: 3.0.0
info:
  title: TimeFocus Public API
  description: |
    API pública de TimeFocus para desarrolladores externos.
    
    ## Autenticación
    Todas las rutas (excepto `/auth/register` y `/auth/login`) requieren una API Key válida en el header:
    ```
    X-API-Key: tf_live_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    ```
    
    ## Empezar
    1. Regístrate en `POST /auth/register`
    2. Guarda tu API Key (solo se muestra una vez)
    3. Úsala en el header `X-API-Key` en todas tus peticiones
    
    ## Rate Limiting
    - 100 requests por minuto por API Key
    
  version: 1.0.0
  contact:
    email: soporte@timefocus.utxj.edu.mx

servers:
  - url: http://localhost:4000/api/v1
    description: Desarrollo local
  - url: https://api.timefocus.com/api/v1
    description: Producción

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Estudiar para examen de Cálculo
        description:
          type: string
          example: Repasar integrales y derivadas
        status:
          type: string
          enum: [pending, in_progress, completed]
          example: pending
        priority:
          type: string
          enum: [low, medium, high]
          example: high
        due_date:
          type: string
          format: date
          example: "2026-05-15"
        subject:
          type: string
          example: Cálculo Diferencial
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StudySession:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
          example: "2026-04-18"
        start_time:
          type: string
          example: "09:00"
        end_time:
          type: string
          example: "10:30"
        duration_minutes:
          type: integer
          example: 90
        type:
          type: string
          enum: [study, break, pomodoro]
          example: study
        subject:
          type: string
          example: Programación Web

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string

paths:
  /auth/register:
    post:
      tags: [Autenticación]
      summary: Registrar cuenta de desarrollador
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Juan Pérez
                email:
                  type: string
                  example: juan@ejemplo.com
                password:
                  type: string
                  minLength: 8
                  example: miPassword123
      responses:
        '201':
          description: Cuenta creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      developer:
                        type: object
                        properties:
                          id: { type: integer }
                          name: { type: string }
                          email: { type: string }
                      api_key:
                        type: string
                        example: tf_live_a1b2c3d4e5f6...
                      warning:
                        type: string
                        example: Guarda tu API Key, no se mostrará de nuevo
        '409':
          description: El correo ya está registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Autenticación]
      summary: Iniciar sesión y ver tus API Keys
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: juan@ejemplo.com
                password:
                  type: string
                  example: miPassword123
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      developer:
                        type: object
                      api_keys:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: integer }
                            key_value: { type: string }
                            name: { type: string }
                            active: { type: integer }
                            requests: { type: integer }

  /auth/keys:
    post:
      tags: [Autenticación]
      summary: Crear nueva API Key
      responses:
        '201':
          description: API Key creada

  /auth/keys/{id}:
    delete:
      tags: [Autenticación]
      summary: Revocar API Key
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: API Key revocada

  /tasks:
    get:
      tags: [Tareas]
      summary: Listar todas las tareas
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, in_progress, completed]
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high]
        - in: query
          name: subject
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de tareas
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  meta:
                    type: object
                    properties:
                      total: { type: integer }
                      limit: { type: integer }
                      offset: { type: integer }

    post:
      tags: [Tareas]
      summary: Crear nueva tarea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  example: Entregar proyecto de Redes
                description:
                  type: string
                status:
                  type: string
                  enum: [pending, in_progress, completed]
                  default: pending
                priority:
                  type: string
                  enum: [low, medium, high]
                  default: medium
                due_date:
                  type: string
                  format: date
                subject:
                  type: string
      responses:
        '201':
          description: Tarea creada

  /tasks/{id}:
    get:
      tags: [Tareas]
      summary: Obtener tarea por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tarea encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'
        '404':
          description: Tarea no encontrada

    put:
      tags: [Tareas]
      summary: Actualizar tarea
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
      responses:
        '200':
          description: Tarea actualizada

    delete:
      tags: [Tareas]
      summary: Eliminar tarea
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tarea eliminada

  /stats/summary:
    get:
      tags: [Estadísticas]
      summary: Resumen general de estudio
      responses:
        '200':
          description: Estadísticas generales
          content:
            application/json:
              example:
                success: true
                data:
                  today:
                    study_minutes: 90
                    study_hours: 1.5
                    sessions: 2
                  week:
                    study_minutes: 420
                    study_hours: 7.0
                    sessions: 10
                  month:
                    study_minutes: 1800
                    study_hours: 30.0
                  tasks:
                    total: 15
                    completed: 8
                    pending: 5
                    in_progress: 2

  /stats/daily:
    get:
      tags: [Estadísticas]
      summary: Estadísticas por día
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 7
          description: Número de días hacia atrás
      responses:
        '200':
          description: Estadísticas diarias

  /stats/weekly:
    get:
      tags: [Estadísticas]
      summary: Estadísticas por semana
      parameters:
        - in: query
          name: weeks
          schema:
            type: integer
            default: 4
      responses:
        '200':
          description: Estadísticas semanales

  /stats/sessions:
    get:
      tags: [Sesiones]
      summary: Historial de sesiones de estudio
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: type
          schema:
            type: string
            enum: [study, break, pomodoro]
      responses:
        '200':
          description: Lista de sesiones

    post:
      tags: [Sesiones]
      summary: Registrar sesión de estudio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, duration_minutes]
              properties:
                date:
                  type: string
                  format: date
                  example: "2026-04-18"
                start_time:
                  type: string
                  example: "09:00"
                end_time:
                  type: string
                  example: "10:30"
                duration_minutes:
                  type: integer
                  example: 90
                type:
                  type: string
                  enum: [study, break, pomodoro]
                  default: study
                subject:
                  type: string
                  example: Programación Web
      responses:
        '201':
          description: Sesión registrada
